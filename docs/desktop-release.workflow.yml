name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  windows:
    name: Windows desktop
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nodejs
            mingw-w64-x86_64-npm
            curl

      - name: Build Pikafish for Windows
        run: |
          git clone --depth 1 https://github.com/official-pikafish/Pikafish.git /tmp/pikafish
          make -C /tmp/pikafish/src build ARCH=x86-64 COMP=mingw -j"$(nproc)"
          mkdir -p engines/pikafish
          cp /tmp/pikafish/src/pikafish.exe engines/pikafish/pikafish.exe
          cp /tmp/pikafish/src/pikafish.nnue engines/pikafish/pikafish.nnue

      - name: Install dependencies
        run: npm install

      - name: Build Windows package
        run: npm run dist:win

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: xianqi-windows
          path: |
            dist/*.exe

  macos-arm64:
    name: macOS arm64 desktop
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS package
        run: npm run dist:mac -- --arm64

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: xianqi-macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip
